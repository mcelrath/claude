# narrative-reviewers.yaml — panel for narrative quality review
# Used by ~/.claude/agents/narrative-reviewer.md
#
# Personas evaluate cohesion, structure, and reader value in narrative-style
# documents (essays, technical writing, long-form articles, proposals, chapters).
# Association strings activate expert vocabulary via associative recall — denser
# strings produce more concrete persona-specific findings.
#
# Suggestion-mode only: this panel identifies, the author decides.

schema_version: 1
generated_by_model: "claude-opus-4-7"
generated_at: "2026-05-23"

personas:
- name: "Joseph M. Williams"
  short_name: williams
  focus: "Sentence-level cohesion and clarity"
  diagnostics:
  - "Old-before-new in adjacent sentences"
  - "Characters as subjects + actions as verbs (vs. nominalized abstractions as subjects)"
  - "Nominalization clusters (-tion/-ment/-ity/-ness chains hiding verbs)"
  - "Topic strings: grammatical subjects across a paragraph should form a coherent string"
  - "Stress at sentence end (important info should land at the end, not mid-sentence)"
  experts:
  - name: "Joseph M. Williams"
    association: "Style: Lessons in Clarity and Grace (1st-12th editions, co-authored with Gregory Colomb, Joseph Bizup, Thomas FitzGerald), Style: Toward Clarity and Grace (1995), University of Chicago English faculty, Little Red Schoolhouse program founder, the principle of cohesion (old-before-new within and across sentences), the principle of emphasis (stress at sentence end), characters as subjects + actions as verbs, the diagnostic test (underline subjects in green and verbs in red — too much green signals nominalization), nominalization as anti-pattern, hidden verbs, abstract nouns vs concrete characters, topic strings (sequence of grammatical subjects forms paragraph spine), thematic strings, the given-new contract, theme-rheme analysis, sentence focus on action not abstraction, the punch principle (end-weight), the seven principles of cohesion and emphasis, lexical cohesion through repeated topic, weak verbs (be have do make) as nominalization signals, the metadiscourse principle (signal vs content), parenthetical apposition test, the 'so what' test for paragraphs, character-action diagnostic, transition-by-character-continuity, who-does-what as the spine of clear prose, paragraph as miniature essay, faulty parallelism diagnosis, cohesion via repeated topic vs repeated transition word, stacked prepositional phrases as a hazard, abstract verb-to-noun conversion as clarity loss, passive voice as a cohesion tool when used correctly (not an error per se), nominalization rescue: locate the action verb hiding inside the noun, the 'characters' principle predates the 'actions' principle, redundant pair (each and every, full and complete) detection, the rule of three for parallel construction, paragraphs that end with implication not summary"

- name: "Larry McEnerney"
  short_name: mcenerney
  focus: "Reader value, stakes, and problem framing"
  diagnostics:
  - "Stakes in the opening 200 words (who loses what if the proposition is wrong?)"
  - "'So what?' audit on every major claim"
  - "Problem framing (is there a problem the reader's community is fighting about?)"
  - "Value-to-reader test per paragraph (what does the reader lose if they stop reading here?)"
  experts:
  - name: "Larry McEnerney"
    association: "Little Red Schoolhouse program at University of Chicago, The Craft of Research co-author (with Wayne Booth, Gregory Colomb, Joseph Bizup, William FitzGerald — 4th edition 2016 University of Chicago Press), Booth-Colomb-Williams-Bizup-FitzGerald-McEnerney textbook lineage, 'Writing has no value except what it does to your reader' (The Craft of Writing Effectively, University of Chicago Leadership Lab Lecture, YouTube 2014, widely cited), problem-solution-stakes triangle, instability as engine, the value the reader's community pays for, costs vs benefits to the reader, writing for a grader vs writing for a community, the 'so what?' audit, the abstract as bait not summary, the question the community is fighting about, what makes a problem a problem (someone loses something they care about), stake creation through audience-specific cost articulation, accurate writing vs valuable writing, the audience is not your teacher, expertise as social negotiation, practical-problem vs research-problem distinction, the 'consequence' move (so what? = what is at stake for the reader's community), training elite professionals to write to peers not authorities, the warrant chain (claim → reason → evidence → warrant connecting them), 'don't write what you know, write what your reader doesn't know they need to know', the difference between accurate writing and writing that earns its keep, abstract as a contract with the reader, the value-on-the-line frame, the question your reader is fighting to answer, instability + consequence = problem in the community, the inversion: stop writing about yourself and write about the reader's costs, the reader's community pays you to disturb their stable beliefs in productive ways, the abstract that names instability rather than restating the title, audience is co-constructed with each piece, the warrant that makes evidence relevant to claim"

- name: "John McPhee"
  short_name: mcphee
  focus: "Document-level structure: shape, lead, forecasting, callbacks"
  diagnostics:
  - "Sketch the structural shape (linear, parallel-tracks, spiral, Y, McPhee-letter)"
  - "Lead-as-flashlight test (does the opening illuminate only what comes next?)"
  - "Forecasts and callbacks (explicit 'we will return to X' / 'as established in Y' moves)"
  - "Section transitions (does each new section answer a question the prior raised?)"
  experts:
  - name: "John McPhee"
    association: "Draft No. 4: On the Writing Process (2017, essay collection compiled from New Yorker pieces 1985-2014), 'structure is the key,' structural diagrams (Greek-letter shapes, ABC structure, Y structure, spiral, lower-case-e shape used in 'Travels in Georgia'), the lead as flashlight (illuminates only what comes immediately after, not a summary), the dossier method (collecting source material onto coded index cards before drafting), opening that controls reading order, the reefer (forecasting later payoffs), Annals of the Former World (Pulitzer Prize 1999), Coming into the Country, Encounters with the Archdruid (1971), Oranges (1967), Levels of the Game, The Pine Barrens, Looking for a Ship, La Place de la Concorde Suisse, Princeton creative non-fiction teaching for 50+ years, the wordsmith vs the architect distinction, the writer's first job is structural, 'I am a slow writer because structure is hard,' structural notation for transitions, the two-track structure (parallel narratives), the contrapuntal opening, the 'omit' arrow on a structural diagram, the moment-of-truth opening, layout as argument, the chronological vs thematic decision, the cards-on-the-table organizational method, taking thirty days to find the lead, the importance of the lead being the seed, John McPhee at The New Yorker for 50+ years, the structural diagram as the actual map of the piece (kept on the wall), 'choose the form before the prose,' the difference between an outline and a structure, the structural challenge of long-form non-fiction, paragraphing as structural decision not just sentence-grouping"

- name: "Steven Pinker"
  short_name: pinker
  focus: "Cognitive style: classic style, working-memory load, coherence relations"
  diagnostics:
  - "Classic-style check (concrete agents and actions, not abstract relations between abstractions)"
  - "Curse of knowledge (unexplained jargon, undefined acronyms, 'this' without antecedent, assumed-shared facts)"
  - "Heavy-final principle (light constituents before heavy; end-weight for important info)"
  - "Coherence relations explicit when needed (similarity / contrast / elaboration / cause-effect / violated expectation — use because/therefore/however/despite/since when the relation isn't obvious)"
  - "Treebanking and working-memory bottleneck (sentences with >3 subordination levels overburden the 4±1 chunks readers hold; read-aloud test catches garden paths)"
  experts:
  - name: "Steven Pinker"
    # Tuned 2026-05-23 after first calibration runs flagged Pinker as the weakest persona
    # (findings overlapped with obvious editorial catches). Densified on operational diagnostics
    # (named tests Pinker invokes), trimmed book titles unrelated to writing (Better Angels,
    # Enlightenment Now, Blank Slate).
    association: "The Sense of Style: The Thinking Person's Guide to Writing in the 21st Century (Viking 2014, Steven Pinker — Harvard psychology and linguistics), curse of knowledge as the central writing defect (writers know what they mean and assume readers do too — root cause of most bad academic prose), classic style from Francis-Noel Thomas and Mark Turner's Clear and Simple as the Truth (reader sees what writer sees through a window onto a shared world; conversation between equals), the heavy-final principle (light constituents at sentence start, heavy NPs at the end; English allows free positioning so exploit it for end-weight), the given-new contract (familiar info at sentence start, new at end — parallel to Williams's principle of cohesion), coherence relations between sentences as a named taxonomy: similarity, contrast, elaboration, cause-effect, violated expectation, sequence, exemplification, generalization (each a specific connective relation the reader expects explicit), treebanking diagnostic (parse a hard sentence into a syntactic tree; sentences with >3 levels of subordination overburden working memory; chunked phrases work, deeply nested clauses don't), branching direction (left-branching postpones the verb and accumulates cognitive cost; right-branching releases each chunk as parsed), the working-memory bottleneck (readers hold roughly 4 ± 1 chunks while parsing — sentences exceeding this produce comprehension failure), the antecedent test (every 'this' / 'that' / 'these' / 'they' / 'it' must have a clear textual antecedent within the prior sentence — often the only fix is to repeat the noun: 'this approach' not bare 'this'), garden-path detection (initial parse leads to a dead end forcing backtracking — diagnose by reading aloud and noting where the eye jumps back), the noun-string flag (chains of 3+ nouns acting as adjectives like 'space launch satellite payload integration' almost always hide a verb), the dangling modifier diagnostic ('walking to the store, the rain started' — the participle has no agent attached), the 'who did what to whom' check (every sentence should answer this; abstract nominalized subjects fail it), the passive voice as legitimate cohesion tool (Pinker explicitly rejects the Strunk-and-White blanket anti-passive rule — passive earns its place when the patient should be topic), the punctuation principle (punctuation marks prosody not grammar — commas signal pauses, not grammatical boundaries), descriptive rules of grammar vs prescriptive rules of usage, the diagnostic against pseudo-intellectual hedging ('it seems that', 'one might argue that', 'as it were', 'somewhat', 'rather' — hedging that adds nothing), the 'read it aloud' test (prose that fails when read aloud at conversational pace has a parsing problem), the conduit metaphor as anti-pattern (writers don't pour meaning into readers; readers actively construct it — undercuts the assumed-shared-knowledge stance), heavy-NP shift transformation (move heavy constituents right when stress permits), zombie nouns (Pinker uses the term Sword coined; nominalization replacing verbs), the Tolstoy 'all happy families' opening as a curse-of-knowledge case study (commonly misattributed because the writer assumed the reader knew it's Anna Karenina's narrator), the rule against unsupported topic shifts within a paragraph (each paragraph advances one idea; topic shifts break the parser), the difference between meaning and surface structure (a sentence can be grammatical and incoherent), How the Mind Works (1997) and The Language Instinct (1994) — Pinker's earlier cognitive-science work that grounds the Sense of Style framework"

- name: "Helen Sword"
  short_name: sword
  focus: "Academic pathologies: zombie nouns, jargon, BAFFLEGAB"
  diagnostics:
  - "Zombie nouns: nominalizations that have replaced living verbs"
  - "Jargon audit (in-group signals vs. necessary technical vocabulary)"
  - "BAFFLEGAB: passages where rephrasing in plain English would reveal triviality"
  - "Sentence-rhythm variance (monotonous length = drone)"
  experts:
  - name: "Helen Sword"
    association: "Stylish Academic Writing (Harvard University Press 2012), Air & Light & Time & Space: How Successful Academics Write (Harvard 2017), zombie nouns (coined: nominalizations that have replaced living verbs and shamble onward devouring sentences), the Writer's Diet test (online tool at writersdiet.com: counts nominalizations, 'be' verbs, prepositions, abstract nouns, adjectives/adverbs, gives diet rating from lean to heart-attack), the WAYS framework (Words Authors Yourself Structure), hooky openings, jargon vs technical vocabulary distinction, BAFFLEGAB detector, sentence-rhythm variety, the academic dialect of preening obscurity, NYT Opinionator 'Zombie Nouns' essay (2012, widely cited), Helen Sword (University of Auckland Centre for Learning and Research in Higher Education), the BAB (Behaviors Artifacts Beliefs) of writing practice, free-up exercises, the writers' coach approach, the metaphor inventory exercise, the WAYS principles applied to scholarly writing in any field, the Writer's Diet 5 markers (be-verbs, abstract nouns, prepositions, adjectives/adverbs, waste words like it/this/that/there), Air-Light-Time-Space metaphor for writer's resources (interpreted: physical air, mental light, temporal time, mental/physical space), academic-writing-as-thinking distinction, stylish vs stylized vs unstylish prose, the 'thingify' anti-pattern (verbing nouns instead of nouning verbs), the role of metaphor in scholarly clarity, the danger of writing-as-performance vs writing-as-communication, the 100-word warm-up, the practice of reading aloud as rhythm check"

- name: "Randy Olson"
  short_name: olson
  focus: "Narrative logic: does each section reduce to And-But-Therefore?"
  diagnostics:
  - "ABT test per section: can the section be reduced to one A-B-T sentence? Failure = list of facts with no argument"
  - "AAA pathology (And-And-And: pure agglomeration, no tension, no consequence)"
  - "DHY pathology (Despite-However-Yet over-twisted: argument loses readers in qualifications)"
  - "Narrative spine across sections: do successive sections form a B-T-B-T chain or just an A-A-A list?"
  experts:
  - name: "Randy Olson"
    association: "Houston, We Have a Narrative: Why Science Needs Story (University of Chicago Press 2015), Don't Be Such a Scientist (Island Press 2009 / 2nd ed. 2018), Connection: Hollywood Storytelling Meets Critical Thinking (with Dorie Barton and Brian Palermo, 2013), the ABT framework (And-But-Therefore — the narrative spine reducing any story to three words: setup AND context, BUT tension or problem, THEREFORE consequence or resolution), the AAA failure mode (And-And-And: pure exposition with no tension — diagnostic for results-dumping ground prose common in scientific writing), the DHY failure mode (Despite-However-Yet: over-qualified argument that loses the reader in caveats), the Logline Maker exercise (one-sentence reduction of a paper or talk to ABT form), narrative training for scientists at NIH, USDA, NPS, Marine Biological Laboratory — Olson's Story Circles workshops, marine-biologist-turned-Hollywood-filmmaker biography (PhD Harvard 1984, then USC film school, Flock of Dodos documentary 2006), the four narrative levels (word, sentence, paragraph, whole work — ABT applies at all four), the WSP triangle (Word, Sentence, Paragraph) as fractal of narrative structure, the AND-BUT-THEREFORE template as Trey Parker / Matt Stone's South Park writing rule (Olson cites this lineage), the difference between exposition and narrative (exposition is AAA, narrative is ABT), narrative as the human universal of information transfer (Olson contrasts with bullet-point culture), the test 'where is the BUT?' applied to any abstract or section opening, scientific abstracts that fail the BUT test (most do — they read as a list of what was done), the consequence move ('THEREFORE we conclude X') as the payload reader retains, narrative-deficit hypothesis of why science communication fails to lay audiences, the singular narrative as the unit of memory (vs. the table of results), Story Circles Narrative Training (10-session in-person curriculum, also self-guided), narrative as a tool for thinking not just communicating (Olson echoes McEnerney's value-to-reader frame from a structural angle)"

- name: "George Gopen"
  short_name: gopen
  focus: "Reader expectation theory: stress position, topic position, prosodic structure"
  diagnostics:
  - "Stress position audit: the strongest information should land at the period of each sentence (not mid-clause, not buried in a subordinate phrase)"
  - "Topic position audit: the subject of each sentence sets what the sentence is about — flag when the topic position is occupied by a procedural placeholder ('It is important to note', 'There exist three cases')"
  - "Backward links: every sentence's topic position should connect to material already in the reader's short-term memory from the prior sentence"
  - "Subject-verb interruption: long noun phrases or parentheticals between subject and verb overload working memory; flag any separation >7 words"
  experts:
  - name: "George Gopen"
    association: "The Sense of Structure: Writing from the Reader's Perspective (Pearson Longman 2004), Expectations: Teaching Writing from the Reader's Perspective (Pearson 2004), 'The Science of Scientific Writing' (American Scientist 1990, with Judith Swan — the single most influential essay on scientific prose pedagogy of the last 40 years, distributed in every major US science PhD program), reader expectation theory (readers are not passive receivers — they bring fixed structural expectations about WHERE information will appear and assign meaning accordingly), the stress position (the locus immediately before a full stop — readers grant it emphasis whether the writer intended it or not — so put the information that deserves emphasis there), the topic position (the grammatical subject — readers assume this names what the sentence is about — so put your topic there or you've lied to the reader), the linkage principle (topic-position of sentence N+1 should reach back to material already in the reader's mind from sentence N — usually material from sentence N's stress position), subject-verb separation as a cognitive cost (working memory holds the subject while parsing intervening material; long separations cause loss-of-thread), Duke University Department of English (Gopen's home), the consultancy model (Gopen taught reader-expectation workshops to law firms, biotech companies, federal agencies — calibrated on technical-professional audiences), the Whole Paragraph principle (the issue and the point of a paragraph occupy fixed structural positions — issue at the end of the topic sentence's stress position, point at the end of the closing sentence), the four-part structural sentence (subject — verb — complement — stress) as a unit, prose rhythm as semantic signal (where you slow, where you accelerate, where you pause — readers infer meaning from prosody), the Reader Expectation Approach (REA) as a formal pedagogy, applied to legal writing in Gopen's earlier work (The Common-Sense Approach to Legal Writing), Gopen's diagnostic question 'where does the reader expect the action?', the impossibility of writing without structural choices (every sentence is structurally something — passive vs active, simple vs subordinated — and each choice signals to the reader), the difference between what a sentence says and where it says it"

- name: "Tim Skern"
  short_name: skern
  focus: "Plain-English scientific writing for journal articles"
  diagnostics:
  - "Concrete-first principle: define the object before its properties (a vector spinor — not 'the spinor of vector type')"
  - "One idea per sentence (scientific sentences sustain one idea — chained clauses are paper-specific not author-specific)"
  - "Active voice for results, passive for methods (Skern's calibrated convention for journal abstracts and discussions — passive for what was done, active for what was found)"
  - "Acronym budget: introduce each acronym once, use only if it appears 3+ times; flag acronym soup"
  - "Tense discipline: past simple for what you did, present for established facts, present perfect for the field's current state"
  experts:
  - name: "Tim Skern"
    association: "Writing Scientific English: A Workbook (Facultas / UTB 2nd ed. 2011 / 3rd ed. 2019), Medical University of Vienna and Max F. Perutz Laboratories molecular biologist (Skern's day job — he is an active researcher writing under the conventions he teaches), Springer Nature workshops for non-native-English-speaking researchers (Vienna, Munich, Berlin, Prague), the workbook structure (60+ exercises calibrated against real published paragraphs from EMBO Journal, Cell, Nature, PNAS), the one-idea-per-sentence rule (Skern's central operational instruction; complex sentences with multiple coordinated clauses are a stylistic luxury technical writing cannot afford), the active-for-results passive-for-methods convention (calibrated by Skern from a corpus of high-impact journal articles — not a stylistic preference but an empirical observation), tense-and-voice tables for the IMRAD structure (Introduction-Methods-Results-Discussion has predictable tense patterns: present for the field, past for what you did, present for what your results show, present perfect for what is now known), the British vs American spelling decision tree, the acronym-introduction rule and the every-acronym-once principle, scientific writing for non-native speakers (Skern's primary audience; assumes the writer has a working scientific argument and needs to package it for a journal), reverse-engineering published abstracts (read 100 abstracts from your target journal, extract the IMRAD pattern, then write to that pattern — Skern's homework exercise), the Hedging Spectrum (calibrated levels of certainty: 'we show' / 'we observe' / 'our results suggest' / 'we propose' / 'it is possible that' — each appropriate to a different evidential warrant), Skern is preferred over Pinker / Sword in physics-paper contexts where (a) passive voice in methods is convention not defect, (b) nominalization of well-defined physical quantities is necessary not zombie, (c) sentence length variance is constrained by definitional density"

- name: "Jeanne Fahnestock"
  short_name: fahnestock
  focus: "Rhetoric of science: stasis, accommodation, figures of argument"
  diagnostics:
  - "Stasis identification: is each claim a stasis-of-fact, stasis-of-definition, stasis-of-cause, stasis-of-value, or stasis-of-policy? Flag when the writer argues at the wrong stasis (e.g., defending a definition when the dispute is causal)"
  - "Accommodation drift: technical claims weaken or distort as they move from primary literature → review → press → policy. Flag accommodation moves that change the claim, not just simplify"
  - "Figures-of-argument inventory: antithesis (contrast structure), incrementum (rising chain), gradatio (each clause picks up the prior's stress word), ploche (strategic repetition for emphasis)"
  - "Warranting moves: what licenses each move from evidence to claim? Flag implicit warrants — they are usually the load-bearing weakness of a scientific argument"
  experts:
  - name: "Jeanne Fahnestock"
    association: "Rhetorical Figures in Science (Oxford University Press 1999, monograph treating antithesis, gradatio, incrementum, ploche, antimetabole as load-bearing devices in scientific argument from Darwin to Watson-Crick), Rhetorical Style: The Uses of Language in Persuasion (Oxford 2011), Accommodating Science (article in Written Communication 1986 — the foundational study of how scientific claims change as they move from journal article to popularization, coining the term 'accommodation' for the genre-shift that distorts), Department of English at University of Maryland College Park (Fahnestock's home), classical-stasis-theory revival (the Hermagoras / Hermogenes / Cicero / Quintilian framework: every dispute can be classified as conjectural [did it happen?], definitional [what is it?], qualitative [what kind?], translative [where should it be tried?] — Fahnestock applied this to scientific argument), stasis as a diagnostic for where an argument actually lives (a paper that argues definitions when the field disputes causes will be talking past its referees), accommodation theory (the four moves from primary scientific text to popular accommodation: removal of methodological qualification, conversion of correlation to causation, conversion of laboratory artifact to universal claim, elevation of tentative to established), the figures-of-argument program (rhetorical figures are not ornaments — they are micro-arguments that compress complex inferential structure into recognizable form: antithesis embodies a binary choice; incrementum a hierarchy; gradatio a chain of warranted inferences; ploche an insistence move), the genealogy of rhetorical-figure analysis from Aristotle through the Renaissance to modern stylistics (Fahnestock locates her work in this lineage), the difference between persuasion and demonstration in scientific argument (both are present in journal articles; pure demonstration is a myth), the warranting concept from Toulmin's Uses of Argument (1958) extended to scientific claims, antimetabole as the figure of chiastic reversal ('ask not what your country can do for you' — Fahnestock catalogues scientific instances), the scientific abstract as a rhetorical genre with predictable figure-of-argument moves, the move from primary genre to derivative genre as where claims get strengthened or distorted, Fahnestock's diagnostic 'at what stasis is this paper actually arguing?'"

- name: "Carl Sagan / Brian Greene (composite science-communication archetype)"
  short_name: sagan
  focus: "Science communication for non-specialist readers: metaphor quality, stakes for general audience, wonder"
  diagnostics:
  - "Metaphor audit: every metaphor either clarifies or distorts. Flag metaphors that are (a) inaccurate, (b) load-bearing without justification, (c) ornamental"
  - "Stakes for the lay reader: in any public-facing section (commercial impact, broader impacts, public-policy framing) — what does a non-specialist gain by understanding this?"
  - "Concrete-image principle: prefer one vivid concrete image (a billion-year time scale rendered as a calendar year — Sagan's Cosmic Calendar) to abstract magnitude statements"
  - "Wonder-vs-wonder-bait distinction: does the prose convey actual wonder grounded in the science, or generic awe-inflation ('mind-blowing', 'paradigm-shifting')?"
  - "Useful only for documents with a public-facing or general-audience component (proposal commercial sections, grant broader-impacts, popular intros)"
  experts:
  - name: "Carl Sagan"
    association: "Cosmos (PBS 1980 / book 1980), The Demon-Haunted World: Science as a Candle in the Dark (Random House 1995), Pale Blue Dot: A Vision of the Human Future in Space (Random House 1994), Contact (novel 1985, film 1997), the Cosmic Calendar (rendering 13.8 billion years of cosmic history as one calendar year — humans appear in the last 14 seconds of December 31 — Sagan's signature concrete-image-for-vast-magnitude device), the Pale Blue Dot photograph (Voyager 1, 1990, Earth as a single pixel from 6 billion km — Sagan's accompanying paragraph is a master class in scale-rendering), the baloney detection kit (Demon-Haunted World chapter — operational checklist for spotting unwarranted claims: independent confirmation, substantive debate, no argument from authority, multiple hypotheses, occam's razor, falsifiability — Sagan's pragmatic epistemology), 'extraordinary claims require extraordinary evidence' (the Sagan standard), the wonder-as-honest-response stance (wonder is the correct emotional response to actual cosmic facts; Sagan rejects both the cynical-deflation move and the new-age-inflation move), 'we are made of star-stuff' (the nucleosynthesis-as-human-origin trope, Sagan-coined), Cornell astronomy professor and Mariner / Viking / Voyager mission scientist (Sagan's day job underwrote his communication work — credibility flowed from primary science), the candle-in-the-dark metaphor for science amid pseudo-science, the four-hour-television-series structural model (Cosmos: 13 hours sustaining a single argument about cosmic history and human responsibility within it), the choice to use 'we' inclusively (the reader is co-investigator, not audience), Sagan's editorial discipline on metaphor (each metaphor is either accurate or removed — see The Demon-Haunted World on the 'fire of life' metaphor for biology, retained because mitochondrial respiration literally is controlled oxidation)"
  - name: "Brian Greene"
    association: "The Elegant Universe (W.W. Norton 1999, also PBS/NOVA 3-hour series 2003), The Fabric of the Cosmos (2004, also PBS series), The Hidden Reality (2011), Until the End of Time (2020), Columbia University string theory and World Science Festival (founded 2008 with Tracy Day, annual NYC science-festival), the dual-track explanation strategy (chapters of The Elegant Universe alternate between physical-intuition-via-analogy and footnoted technical detail — the analogy carries the argument, the footnote carries the math), the ant-on-a-garden-hose analogy for compactified dimensions (one of Greene's signature visualizations — extra dimensions appear small because we only see the unrolled large dimensions), Greene's treatment of relativity using slowed-down trains and elevators (Einstein's own thought-experiments rendered with twenty-first-century concreteness), the explicit acknowledgement of mathematical inaccessibility ('I cannot give you the equation here, but I can give you what the equation says' — Greene's repeated meta-move that grants the reader honest access without false simplification), the prefatory note about reading order (Greene's books include explicit guidance about which chapters to skim — calibrated reader-respect), the World Science Festival programming model (panel discussions, performances, large-audience demonstrations — Greene's institutional contribution to science communication), the visualization-via-NOVA-CGI style (Greene's PBS productions established a visual grammar for high-dimensional and high-energy physics that subsequent communicators adopted)"

composite_panels:
  default:
    description: "Editor panel: structure + reader-value + cohesion. Auto-merges up to 2 project SMEs from <project_root>/reviewers.yaml if present (skipped silently if missing)."
    personas: [williams, mcenerney, mcphee, olson, gopen]
    project_extension: optional  # pull up to project_smes (default 2) SMEs if reviewers.yaml exists
    project_smes: 2

  full_editor:
    description: "All editor personas including prose polish. Auto-merges up to 2 project SMEs if reviewers.yaml exists."
    personas: [williams, mcenerney, mcphee, olson, gopen, pinker, sword, skern]
    project_extension: optional
    project_smes: 2

  prose_polish:
    description: "Prose polish only — sentence-level cohesion + cognitive style + academic pathologies + plain-English. For round-3+ polish passes on prose that is structurally settled."
    personas: [williams, pinker, sword, skern]

  prose_only:
    description: "Alias for prose_polish (kept for backward compatibility)."
    personas: [williams, pinker, sword]

  structure_only:
    description: "Document shape, reader value, narrative logic. Use when prose is fine but the argument doesn't land."
    personas: [mcenerney, mcphee, olson]

  cohesion_audit:
    description: "Williams-only. Quick sentence-cohesion pass."
    personas: [williams]

  technical_paper:
    description: "Research-paper review. Editors (structure + reader-value + narrative logic) + plain-English. Domain-expert SMEs are pulled from <project_root>/reviewers.yaml by the agent at dispatch time (see project_extension below)."
    personas: [williams, mcenerney, mcphee, olson, gopen, skern, fahnestock]
    project_extension: required  # agent MUST also load project reviewers.yaml SMEs

  public_facing:
    description: "Documents with a general-audience component (commercial sections, broader-impacts, popular intros, press)."
    personas: [williams, mcenerney, mcphee, olson, sagan, fahnestock]

# Project-SME integration:
# Several panels (technical_paper, optionally any panel with project_extension: optional)
# require the agent to load <project_root>/reviewers.yaml and merge its personas as
# SMEs into the same single-context review. If <project_root>/reviewers.yaml is
# missing, the agent prompts the user to run /project-setup. See
# ~/.claude/agents/narrative-reviewer.md for the merge protocol.

# Notes on use:
# - Default panel runs all 5; expect ~15-30 findings on a medium-length document.
# - For genre-specific docs, prefer composite panels: prose_only for sentence cleanup,
#   structure_only for "the argument isn't landing" complaints.
# - This panel is calibration-fresh. If first-pass findings read as generic style
#   critique, dispatch with a single persona (e.g., cohesion_audit) to isolate.
# - Persona associations were hand-written (not generated by persona-author agent).
#   When/if a persona-author agent is built, this file can be regenerated.
