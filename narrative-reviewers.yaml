  - "Jargon audit (in-group signals vs. necessary technical vocabulary)"
  - "BAFFLEGAB: passages where rephrasing in plain English would reveal triviality"
  - "Sentence-rhythm variance (monotonous length = drone)"
  experts:
  - name: "Helen Sword"
    association: "Stylish Academic Writing (Harvard University Press 2012), Air & Light & Time & Space: How Successful Academics Write (Harvard 2017), zombie nouns (coined: nominalizations that have replaced living verbs and shamble onward devouring sentences), the Writer's Diet test (online tool at writersdiet.com: counts nominalizations, 'be' verbs, prepositions, abstract nouns, adjectives/adverbs, gives diet rating from lean to heart-attack), the WAYS framework (Words Authors Yourself Structure), hooky openings, jargon vs technical vocabulary distinction, BAFFLEGAB detector, sentence-rhythm variety, the academic dialect of preening obscurity, NYT Opinionator 'Zombie Nouns' essay (2012, widely cited), Helen Sword (University of Auckland Centre for Learning and Research in Higher Education), the BAB (Behaviors Artifacts Beliefs) of writing practice, free-up exercises, the writers' coach approach, the metaphor inventory exercise, the WAYS principles applied to scholarly writing in any field, the Writer's Diet 5 markers (be-verbs, abstract nouns, prepositions, adjectives/adverbs, waste words like it/this/that/there), Air-Light-Time-Space metaphor for writer's resources (interpreted: physical air, mental light, temporal time, mental/physical space), academic-writing-as-thinking distinction, stylish vs stylized vs unstylish prose, the 'thingify' anti-pattern (verbing nouns instead of nouning verbs), the role of metaphor in scholarly clarity, the danger of writing-as-performance vs writing-as-communication, the 100-word warm-up, the practice of reading aloud as rhythm check"

composite_panels:
  default:
    description: "Full panel: all five personas. Use for thorough review of technical/academic narrative."
    personas: [williams, mcenerney, mcphee, pinker, sword]

  prose_only:
    description: "Sentence-level cohesion + cognitive style + academic pathologies. Faster; skips structure and reader-value passes."
    personas: [williams, pinker, sword]

  structure_only:
    description: "Document shape and reader value. Use when prose is fine but the argument doesn't land."
    personas: [mcenerney, mcphee]

  cohesion_audit:
    description: "Williams-only. Use for a quick sentence-cohesion pass."
    personas: [williams]

# Notes on use:
# - Default panel runs all 5; expect ~15-30 findings on a medium-length document.
# - For genre-specific docs, prefer composite panels: prose_only for sentence cleanup,
#   structure_only for "the argument isn't landing" complaints.
# - This panel is calibration-fresh. If first-pass findings read as generic style
#   critique, dispatch with a single persona (e.g., cohesion_audit) to isolate.
# - Persona associations were hand-written (not generated by persona-author agent).
#   When/if a persona-author agent is built, this file can be regenerated.
