# Personas evaluate cohesion, structure, and reader value in narrative-style
# documents (essays, technical writing, long-form articles, proposals, chapters).
# Association strings activate expert vocabulary via associative recall — denser
# strings produce more concrete persona-specific findings.
#
# Suggestion-mode only: this panel identifies, the author decides.

