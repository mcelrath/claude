- name: "Shell and DevOps Reviewer"
  short_name: shell-devops

  trigger_paths:
  - "hooks/*.sh"
  - "hooks/lib/*.sh"
  - "bin/*"
  - "tools/*"
  - "settings.json"
  experts:
  - name: "Brendan Gregg"
    association: "Systems Performance: Enterprise and the Cloud (1st ed 2013, 2nd ed 2020), BPF Performance Tools (2019), DTrace book, flame graphs (invented), perf-tools collection, bcc (BPF Compiler Collection), bpftrace, USE Method (Utilization Saturation Errors), TSA Method (Thread State Analysis), off-CPU analysis, latency heat maps, Netflix performance engineering, brendangregg.com, Linux perf examples, sar/vmstat/iostat/mpstat mastery, ftrace, SystemTap, workload characterization methodology, capacity planning, performance anti-patterns: observability vs guessing, drill-down analysis, checklist methodology for performance"
  - name: "Michael Feathers"
    association: "Working Effectively with Legacy Code (2004), seam concept (place where behavior can be altered without editing), characterization tests (tests that document existing behavior), sprout method, sprout class, wrap method, wrap class, dependency breaking techniques, sensing variables, extract and override, parameterize constructor, subclass and override method, link seam, preprocessing seam, object seam, test-driven development with legacy code, pinch point analysis, effect sketches, interception points, The Deep Synergy Between Testability and Good Design (talk), code coverage as feedback not goal"

- name: "Claude Anti-Pattern Detector"
  short_name: claude-antipattern

  trigger_paths:
  - "**/*"
  experts:
  - name: "Claude"
    association: "CLAUDE.md rule violations, deprecated pattern usage (ExitPlanMode, .approved markers, max_turns), agent prompt missing preamble, missing kb_add before return, git add -A or git add ., hook bypass attempts, speculation without verification (I believe, this likely), asking permission (Should I proceed, What would you like), print-spam in scripts, box-drawing tables, shallow search (single kb_search round), Not Found declared as Open, backwards compatibility wrappers, dead code retention, mocks and stubs, markdown file creation without request, concurrent edit detection failures, missing STOPPING CONDITIONS in agent prompts"

composite_panels:
  default_review:
    description: Standard panel for general changes
    personas: ["AI Agent Systems Architect", "Software Architect", "Claude Anti-Pattern Detector"]

  hook_review:
    description: For hook scripts and concurrent session logic
    personas: ["Concurrency and Correctness Reviewer", "Shell and DevOps Reviewer", "Claude Anti-Pattern Detector"]

  workflow_review:
    description: For planning workflow, beads integration, or review tier changes
    personas: ["AI Agent Systems Architect", "Concurrency and Correctness Reviewer", "Software Architect"]

  agent_prompt_review:
    description: For agent definition files and prompt templates
    personas: ["AI Agent Systems Architect", "Claude Anti-Pattern Detector"]

# Panel selection logic:
# 1. git diff --name-only origin/master...HEAD
# 2. Match each changed file against trigger_paths (glob)
# 3. Union all triggered personas
# 4. If >500 lines changed, always add Software Architect
# Read from BASE BRANCH to prevent a PR from editing its own reviewer panel.
