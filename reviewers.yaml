# Reviewer personas for the claude project (~/.claude)
# Generated by project-setup agent — refine as project matures
# Personas selected by training-data self-evaluation, not fame
#
# Project: Claude Code configuration, agent orchestration, hooks, beads workflow tooling.
# Primary domains: AI agent systems, LLM tooling/workflow, distributed/concurrent task coordination.

technical_domains:

  ai_agent_orchestration:
    primary:
      - name: Lilian Weng
        association: "Author of 'LLM Powered Autonomous Agents' (lilianweng.github.io, 2023): ReAct, MRKL, tool use, memory systems, planning loops. Also: RLHF survey, prompt engineering post."
        recall_depth: HIGH
        use_for: agent architecture review, multi-agent coordination design, memory/KB patterns, review panel composition

      - name: Simon Willison
        association: "Creator of Datasette/llm CLI, prolific blogger (simonwillison.net) on LLM tooling, prompt engineering, cost management, tool use patterns, AI observability."
        recall_depth: HIGH
        use_for: hook design, agent prompt quality, cost/model-tier decisions, workflow anti-pattern detection

    secondary:
      - name: Andrej Karpathy
        association: "nanoGPT, CS231n, 'Software 2.0' essay. Strong on model internals but less on agent orchestration patterns specifically."
        recall_depth: HIGH
        use_for: model calibration review, model selection rationale

  concurrency_and_correctness:
    primary:
      - name: Leslie Lamport
        association: "TLA+, Paxos, 'Time, Clocks, and Ordering of Events', Byzantine Generals, LaTeX, 'How to Write a 21st Century Proof'. Known for precise specification of distributed protocols."
        recall_depth: HIGH
        use_for: concurrent session detection review, task claiming protocol, multi-agent coordination invariants, hook ordering correctness

composite_panels:

  default_review:
    description: Standard review panel for this project (agent orchestration, hooks, workflow)
    reviewers:
      - name: Lilian Weng
        role: AI agent systems expert
        focus: [agent architecture, multi-agent coordination, memory/KB patterns, tool use design]
      - name: Simon Willison
        role: LLM tooling practitioner
        focus: [hook design, agent prompt quality, cost routing, workflow anti-patterns]
      - name: Leslie Lamport
        role: concurrency and correctness critic
        focus: [concurrent session safety, task claiming invariants, hook ordering, state machine correctness]
      - name: Claude
        role: anti-pattern detection
        focus: [CLAUDE.md violations, agent-preamble rules, debug code, deprecated patterns]

  workflow_design_review:
    description: For changes to planning workflow, beads integration, or review tiers
    reviewers:
      - name: Lilian Weng
        role: agent architecture expert
        focus: [review loop design, agent handoff protocols]
      - name: Leslie Lamport
        role: protocol correctness
        focus: [state machine validity, concurrent session safety]
      - name: Claude
        role: anti-pattern detection
        focus: [ExitPlanMode/deprecated patterns, missing kb_add, agent prompt gaps]

  model_routing_review:
    description: For changes to models.yaml, calibration routing, or model tier assignments
    reviewers:
      - name: Simon Willison
        role: LLM tooling expert
        focus: [cost/benefit of model tiers, calibration methodology, routing logic]
      - name: Andrej Karpathy
        role: model behavior expert
        focus: [model capability assessment, confabulation risks, calibration probe design]
      - name: Claude
        role: anti-pattern detection
        focus: [WRONG-model-for-domain violations, missing fallbacks]

model_calibration:
  calibrated: pending
  note: "Run parent calibration protocol to populate."

coverage_gaps:
  - domain: beads_task_system
    note: "No known reviewer persona with deep beads/bd-specific training. Claude self-review is the primary check here."
  - domain: claude_code_hooks
    note: "Hook system is Claude Code-specific. Simon Willison has general LLM tooling coverage but may not know Claude Code hook semantics specifically. Verify hook correctness by reading hooks/ directory directly."
