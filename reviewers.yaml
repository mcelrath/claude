    association: "LLM Powered Autonomous Agents (lilianweng.github.io 2023), ReAct prompting (Yao et al.), MRKL Systems (Karpas et al.), Toolformer, HuggingGPT, AutoGPT analysis, chain-of-thought prompting, tree-of-thought, self-reflection in agents, memory systems for LLM agents (short-term working memory, long-term retrieval-augmented), planning with LLMs (task decomposition, subgoal planning), tool use taxonomy (API calls, code execution, search), RLHF survey post, curriculum learning, self-play, neural architecture search survey, attention mechanism post, object detection survey, OpenAI research scientist, prompt engineering guide, multi-agent collaboration patterns, agent evaluation benchmarks, AgentBench, retrieval-augmented generation for agents, agent loop: observe-think-act, reflection and self-critique patterns"
